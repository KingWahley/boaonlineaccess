<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BANK OF AMERICA
 - Secure Login</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], },
                    colors: {
                        brand: { 50: '#f0f4f8', 100: '#dbe4ef', 500: '#0065B3', 800: '#013a81', 900: '#012169', 950: '#011545', },
                        accent: { 500: '#E31837', },
                        primary: '#012169',
                        red_accent: '#E31837',
                        background_light: '#F8F9FA'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #F8F9FA;
            background-image: radial-gradient(#e5e7eb 1px, transparent 1px);
            background-size: 20px 20px;
        }
    </style>
</head>
<body class="text-gray-800 min-h-screen flex flex-col justify-center py-12 sm:px-6 lg:px-8 relative">
    
    <div class="sm:mx-auto sm:w-full sm:max-w-md relative z-10">
        <div class="flex flex-row items-center justify-center text-brand-900 mb-6 space-x-2 sm:space-x-4">
            <img src="logo.png" alt="Bank of America Logo" class="h-12 sm:h-16 object-contain">
            <h1 class="text-xl sm:text-3xl font-bold tracking-widest uppercase">BANK OF AMERICA</h1>
        </div>
        <p class="text-center text-sm text-gray-500 mb-8 uppercase tracking-widest font-semibold">
            Secure Client Portal Access
        </p>
    </div>

    <div class="sm:mx-auto sm:w-full sm:max-w-md relative z-10">
        <div class="bg-white py-10 px-6 shadow-2xl border border-gray-100 sm:rounded-2xl sm:px-12 relative overflow-hidden">
            <!-- Decorative accent line -->
            <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-brand-900 to-accent-500"></div>

            <form id="login-form" class="space-y-6" onsubmit="handleLogin(event)">
                <div id="error-alert" class="hidden bg-red-50 text-red-700 p-4 rounded-lg text-sm mb-6 border border-red-200 flex items-center transition-all">
                    <i data-lucide="alert-circle" class="w-5 h-5 mr-3 flex-shrink-0"></i>
                    <span class="font-medium">Invalid credentials. Please verify your email, password, and PIN.</span>
                </div>

                <div>
                    <label for="email" class="block text-sm font-semibold leading-6 text-gray-900">Email Address</label>
                    <div class="mt-2 relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i data-lucide="mail" class="h-5 w-5 text-gray-400"></i>
                        </div>
                        <input id="email" name="email" type="email" autocomplete="email" required class="block w-full rounded-lg border-0 py-2.5 pl-10 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-brand-900 sm:text-sm sm:leading-6 bg-gray-50 focus:bg-white transition">
                    </div>
                </div>

                <div>
                    <label for="password" class="block text-sm font-semibold leading-6 text-gray-900">Password</label>
                    <div class="mt-2 relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i data-lucide="lock" class="h-5 w-5 text-gray-400"></i>
                        </div>
                        <input id="password" name="password" type="password" autocomplete="current-password" required class="block w-full rounded-lg border-0 py-2.5 pl-10 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-brand-900 sm:text-sm sm:leading-6 bg-gray-50 focus:bg-white transition">
                    </div>
                </div>

                <div>
                    <label for="pin" class="block text-sm font-semibold leading-6 text-gray-900">4-Digit ATM PIN</label>
                    <div class="mt-2 relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i data-lucide="hash" class="h-5 w-5 text-gray-400"></i>
                        </div>
                        <input id="pin" name="pin" type="password" maxlength="4" autocomplete="off" required class="block w-full rounded-lg border-0 py-2.5 pl-10 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-brand-900 sm:text-sm sm:leading-6 tracking-widest text-center bg-gray-50 focus:bg-white transition" placeholder="••••">
                    </div>
                </div>

                <div class="flex items-center justify-between pt-2">
                    <div class="flex items-center">
                        <input id="remember-me" name="remember-me" type="checkbox" class="h-4 w-4 rounded border-gray-300 text-brand-900 focus:ring-brand-900">
                        <label for="remember-me" class="ml-2 block text-sm text-gray-600 font-medium">Remember me</label>
                    </div>
                    <div class="text-sm leading-6">
                        <a href="#" class="font-semibold text-brand-800 hover:text-brand-900">Forgot password?</a>
                    </div>
                </div>

                <div class="pt-2">
                    <button type="submit" class="flex w-full justify-center rounded-lg bg-brand-900 px-4 py-3 text-sm font-bold leading-6 text-white shadow-md hover:bg-brand-800 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-brand-900 transition items-center">
                        Secure Sign In <i data-lucide="arrow-right" class="w-4 h-4 ml-2"></i>
                    </button>
                </div>
            </form>
        </div>
    </div>
    
    <div class="mt-12 mx-auto max-w-lg relative z-10 text-center px-4">
        
        <p class="mt-6 text-xs text-gray-400 font-medium">&copy; 2026 BANK OF AMERICA
. All rights reserved.</p>
    </div>

    <script>
        lucide.createIcons();

        function handleLogin(event) {
            event.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const pin = document.getElementById('pin').value;
            const errorAlert = document.getElementById('error-alert');

            // Verification logic based on provided credentials
            if (email.toLowerCase() === 'terryrobert252@gmail.com' &&
                password === 'Terry12' &&
                pin === '2044') {
                
                errorAlert.classList.add('hidden');
                
                // Visual loading state
                const btn = document.querySelector('button[type="submit"]');
                btn.classList.add('opacity-75', 'cursor-not-allowed');
                btn.innerHTML = '<i data-lucide="loader-2" class="w-5 h-5 animate-spin mr-2"></i> Authenticating...';
                lucide.createIcons();
                
                // Redirect after brief delay
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1200);

            } else {
                errorAlert.classList.remove('hidden');
                document.getElementById('password').value = '';
                document.getElementById('pin').value = '';
            }
        }
    </script>
</body>
</html>
